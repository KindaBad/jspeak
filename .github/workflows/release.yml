name: Build & Release

# Push a tag like v1.0.1 to build the Linux binary. It is always uploaded as a
# workflow artifact; it is also published to the PUBLIC downloads repo
# (KindaBad/jspeak) automatically when a RELEASE_TOKEN secret is configured
# (a fine-grained PAT with Contents: read/write on KindaBad/jspeak). Without the
# secret the job still succeeds and you can publish the artifact manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    # Build on an older Ubuntu for the widest glibc compatibility.
    runs-on: ubuntu-22.04
    env:
      HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK + layer-shell + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-venv python3-dev \
            python3-gi python3-gi-cairo python3-cairo gir1.2-gtk-3.0 \
            gir1.2-gtklayershell-0.1 libgtk-layer-shell0 \
            libgirepository1.0-dev libcairo2-dev gobject-introspection

      - name: Build
        run: |
          # Use system pycairo/PyGObject (from apt) via --system-site-packages;
          # do NOT pip-install pycairo (its source build conflicts with the
          # system 'packaging' under --system-site-packages).
          python3 -m venv --system-site-packages .venv
          ./.venv/bin/pip install --upgrade pip pyinstaller
          ./.venv/bin/pyinstaller --noconfirm jspeak.spec
          ( cd dist && tar -czf jspeak-linux-x86_64.tar.gz jspeak )

      - name: Read version
        id: ver
        run: echo "v=$(./dist/jspeak/jspeak --version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: jspeak-linux-x86_64
          path: dist/jspeak-linux-x86_64.tar.gz
          retention-days: 7

      - name: Publish to public downloads repo
        if: ${{ env.HAS_RELEASE_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.v }}" \
            --repo KindaBad/jspeak \
            --title "JSpeak v${{ steps.ver.outputs.v }}" \
            --notes "Automated build. See README for install." \
            --prerelease \
            dist/jspeak-linux-x86_64.tar.gz || \
          gh release upload "v${{ steps.ver.outputs.v }}" \
            --repo KindaBad/jspeak \
            dist/jspeak-linux-x86_64.tar.gz --clobber
