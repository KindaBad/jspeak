name: Build Windows

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    env:
      HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-win.txt

      - name: Build
        run: pyinstaller --noconfirm jspeak-win.spec

      - name: Smoke test (binary launches)
        run: |
          ./dist/jspeak/jspeak.exe --version

      - name: Package
        run: Compress-Archive -Path dist/jspeak -DestinationPath dist/jspeak-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: jspeak-windows-x86_64
          path: dist/jspeak-windows-x86_64.zip
          retention-days: 7

      - name: Read version
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.HAS_RELEASE_TOKEN == 'true' }}
        id: ver
        shell: bash
        run: echo "v=$(./dist/jspeak/jspeak.exe --version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Publish Windows build to public downloads repo
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.HAS_RELEASE_TOKEN == 'true' }}
        shell: bash
        env:
          # Same fine-grained PAT as release.yml: Contents read/write on KindaBad/jspeak.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.v }}" \
            --repo KindaBad/jspeak \
            --title "JSpeak v${{ steps.ver.outputs.v }}" \
            --notes "Automated build. See README for install." \
            --prerelease \
            dist/jspeak-windows-x86_64.zip || \
          gh release upload "v${{ steps.ver.outputs.v }}" \
            --repo KindaBad/jspeak \
            dist/jspeak-windows-x86_64.zip --clobber
